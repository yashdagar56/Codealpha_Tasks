<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hangman Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="grid-bg"></div>

    <main class="game-wrapper" id="game-wrapper">
        <div class="panel left-panel">
            <header>
                <div class="glitch-wrapper">
                    <h1 class="glitch" data-text="HANGMAN">HANGMAN</h1>
                </div>
                <div class="subtitle">PROTOCOL <span class="accent-purple">ACTIVE</span></div>
            </header>

            <div class="visual-container">
                <div class="holo-ring holo-ring-1"></div>
                <div class="holo-ring holo-ring-2"></div>
                <div class="holo-ring holo-ring-3"></div>
                
                <svg class="hangman-svg" viewBox="0 0 300 350" id="hangman-visual">
                    <!-- Base Hologram Platform -->
                    <ellipse cx="150" cy="330" rx="100" ry="15" class="platform" />
                    
                    <!-- Base -->
                    <path d="M70,330 L150,310 L230,330" class="draw-part structure" id="part-base" />
                    <!-- Pole -->
                    <line x1="100" y1="315" x2="100" y2="40" class="draw-part structure" id="part-pole" />
                    <!-- Top -->
                    <line x1="100" y1="40" x2="200" y2="40" class="draw-part structure" id="part-top" />
                    <!-- Support -->
                    <line x1="100" y1="80" x2="140" y2="40" class="draw-part structure" id="part-support" />
                    <!-- Rope -->
                    <line x1="200" y1="40" x2="200" y2="80" class="draw-part rope" id="part-rope" />
                    
                    <!-- Head -->
                    <circle cx="200" cy="110" r="30" class="draw-part hangman-part hide" id="part-0" />
                    <!-- Face details (eyes) -->
                    <line x1="190" y1="105" x2="195" y2="105" class="draw-part hangman-part hide" id="part-0-eye1" stroke-width="2" />
                    <line x1="205" y1="105" x2="210" y2="105" class="draw-part hangman-part hide" id="part-0-eye2" stroke-width="2" />
                    
                    <!-- Body -->
                    <line x1="200" y1="140" x2="200" y2="230" class="draw-part hangman-part hide" id="part-1" />
                    <!-- Left Arm -->
                    <line x1="200" y1="160" x2="150" y2="210" class="draw-part hangman-part hide" id="part-2" />
                    <!-- Right Arm -->
                    <line x1="200" y1="160" x2="250" y2="210" class="draw-part hangman-part hide" id="part-3" />
                    <!-- Left Leg -->
                    <line x1="200" y1="230" x2="160" y2="300" class="draw-part hangman-part hide" id="part-4" />
                    <!-- Right Leg -->
                    <line x1="200" y1="230" x2="240" y2="300" class="draw-part hangman-part hide" id="part-5" />
                </svg>
            </div>

            <div class="system-status">
                <div class="status-header">
                    <span>SYSTEM INTEGRITY</span>
                    <span id="attempts-text" class="accent-teal">100%</span>
                </div>
                <div class="health-track">
                    <div class="health-fill" id="health-bar"></div>
                </div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="word-section">
                <h3 class="section-title">TARGET STRING</h3>
                <div class="word-reveal" id="word-display">
                    <!-- Word boxes injected by JS -->
                </div>
            </div>

            <div class="keyboard-section">
                <h3 class="section-title">INPUT MATRIX</h3>
                <div class="keyboard" id="keyboard">
                    <!-- Keyboard injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for Win/Loss -->
    <div class="fullscreen-overlay hide" id="game-modal">
        <div class="modal-box">
            <div class="deco-line top"></div>
            <h2 id="modal-title" class="neon-text">HACK SUCCESSFUL</h2>
            <p id="modal-message">The encrypted payload was: <span id="modal-word" class="highlight"></span></p>
            <button class="cyber-btn" id="btn-restart">
                <span>INITIALIZE REBOOT</span>
            </button>
            <div class="deco-line bottom"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
